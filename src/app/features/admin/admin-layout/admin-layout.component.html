<mat-sidenav-container class="admin-container">
  <mat-sidenav mode="side" opened class="admin-sidenav">
    <div class="sidenav-header">
      <span class="sidenav-title">Admin Panel</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/admin/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/admin/dogs" routerLinkActive="active-link">
        <mat-icon matListItemIcon>pets</mat-icon>
        <span matListItemTitle>Dogs</span>
      </a>
      <a mat-list-item routerLink="/admin/litters" routerLinkActive="active-link">
        <mat-icon matListItemIcon>child_care</mat-icon>
        <span matListItemTitle>Litters</span>
      </a>
      <a mat-list-item routerLink="/admin/puppies" routerLinkActive="active-link">
        <mat-icon matListItemIcon>favorite</mat-icon>
        <span matListItemTitle>Puppies</span>
      </a>
      <a mat-list-item routerLink="/admin/breeds" routerLinkActive="active-link">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Breeds</span>
      </a>
      <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Users</span>
      </a>
    </mat-nav-list>
    <div class="sidenav-footer">
      <button mat-button (click)="signOut()">
        <mat-icon>logout</mat-icon> Sign out
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="admin-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
