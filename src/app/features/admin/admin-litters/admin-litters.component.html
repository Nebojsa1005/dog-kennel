<div class="admin-page">
  <div class="admin-page__header">
    <h1>Litters</h1>
    <button mat-raised-button color="primary" (click)="openDialog()">Add Litter</button>
  </div>

  <div class="admin-filters" [formGroup]="filterForm">
    <mat-form-field>
      <mat-label>Breed</mat-label>
      <mat-select formControlName="breed">
        <mat-option value="">All</mat-option>
        @for (b of breeds; track b.id) {
          <mat-option [value]="b.id">{{ b.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="filteredLitters$" class="mat-elevation-z2 full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let l">{{ l.name }}</td>
    </ng-container>

    <ng-container matColumnDef="breed">
      <th mat-header-cell *matHeaderCellDef>Breed</th>
      <td mat-cell *matCellDef="let l">{{ getBreedName(l.breedId) }}</td>
    </ng-container>

    <ng-container matColumnDef="dateOfBirth">
      <th mat-header-cell *matHeaderCellDef>DOB</th>
      <td mat-cell *matCellDef="let l">{{ l.dateOfBirth }}</td>
    </ng-container>

    <ng-container matColumnDef="motherName">
      <th mat-header-cell *matHeaderCellDef>Mother</th>
      <td mat-cell *matCellDef="let l">{{ l.motherName }}</td>
    </ng-container>

    <ng-container matColumnDef="fatherName">
      <th mat-header-cell *matHeaderCellDef>Father</th>
      <td mat-cell *matCellDef="let l">{{ l.fatherName }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let l">
        <span class="status-badge status-badge--{{ l.status }}">{{ l.status }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let l">
        <button mat-icon-button (click)="openDialog(l)" title="Edit"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="deleteLitter(l)" title="Delete"><mat-icon>delete</mat-icon></button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
