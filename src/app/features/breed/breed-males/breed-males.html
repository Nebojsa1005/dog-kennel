@if (breed()) {
  <div class="dog-list">
    <app-section-header title="Males" />

    @if (profileItems().length === 0) {
      <p class="dog-list__empty">No dogs listed yet.</p>
    } @else {
      <div class="dog-list__cards">
        @for (item of profileItems(); track $index; let i = $index) {
          <app-dog-profile-card [item]="item" (click)="openModal(i)" />
        }
      </div>
    }
  </div>
}
