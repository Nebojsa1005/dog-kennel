<div class="dog-list" *ngIf="breed()">
  <app-section-header title="Males" />

  <p class="dog-list__empty" *ngIf="profileItems().length === 0">No dogs listed yet.</p>

  <div class="dog-list__cards" *ngIf="profileItems().length > 0">
    <app-dog-profile-card
      *ngFor="let item of profileItems(); let i = index"
      [item]="item"
      (click)="openModal(i)"
    />
  </div>
</div>
