<div class="breed-standards" *ngIf="breed()">
  <h2>{{ 'breed.standards' | translate }}: {{ breed()!.name }}</h2>
  <p class="placeholder-note">FCI breed standard content for {{ breed()!.name }} will be placed here. Source: FCI – {{ breed()!.fciGroup }}.</p>

  <div class="standards-placeholder">
    <div class="standards-placeholder__row">
      <span>General Appearance</span><span class="placeholder-text">———</span>
    </div>
    <div class="standards-placeholder__row">
      <span>Size</span><span class="placeholder-text">———</span>
    </div>
    <div class="standards-placeholder__row">
      <span>Coat</span><span class="placeholder-text">———</span>
    </div>
    <div class="standards-placeholder__row">
      <span>Temperament</span><span class="placeholder-text">———</span>
    </div>
  </div>
</div>
