<div class="guestbook-form-wrapper">
  <div class="feedback-box feedback-box--success" *ngIf="isSuccess()">
    {{ 'guestbook.success' | translate }}
  </div>
  <div class="feedback-box feedback-box--error" *ngIf="isError()">
    {{ 'guestbook.error' | translate }}
  </div>

  <form class="guestbook-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-field">
      <label class="form-label">{{ 'guestbook.form.name' | translate }}</label>
      <input class="form-input" type="text" formControlName="name">
    </div>

    <div class="form-field">
      <label class="form-label">{{ 'guestbook.form.message' | translate }}</label>
      <textarea class="form-input form-input--textarea" formControlName="message" rows="5"></textarea>
    </div>

    <div class="form-field">
      <label class="form-label">{{ 'guestbook.form.rating' | translate }}</label>
      <app-star-rating [rating]="rating()" (ratingChange)="onRatingChange($event)"></app-star-rating>
      <span class="form-error" *ngIf="ratingTouched() && rating() < 1">
        {{ 'guestbook.form.ratingRequired' | translate }}
      </span>
    </div>

    <div class="form-field">
      <label class="form-label">{{ 'guestbook.form.image' | translate }}</label>
      <input class="form-input" type="file" accept="image/*" [disabled]="uploadingImage()" (change)="onFileSelected($event)">
      <mat-spinner *ngIf="uploadingImage()" [diameter]="20"></mat-spinner>
      <div class="image-preview" *ngIf="imageBase64()">
        <img [src]="imageBase64() | transformImage:300" alt="Preview">
        <button type="button" class="image-preview__remove" (click)="removeImage()">×</button>
      </div>
    </div>

    <button type="submit" class="btn" [disabled]="form.invalid || rating() < 1 || isLoading() || uploadingImage()" [class.btn--loading]="isLoading()">
      <mat-spinner *ngIf="isLoading()" [diameter]="20"></mat-spinner>
      {{ (isLoading() ? 'guestbook.sending' : 'guestbook.submit') | translate }}
    </button>
  </form>
</div>
