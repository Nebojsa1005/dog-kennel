<article class="dog-profile-card">
  <div class="dog-profile-card__photo">
    <app-dog-img [src]="item.photoUrl" [alt]="item.name" aspectRatio="1/1" />
  </div>

  <div class="dog-profile-card__fields">
    <div class="field">
      <span class="field__label">Name</span>
      <span class="field__value">{{ item.name }}</span>
    </div>
    <div class="field" *ngIf="item.gender">
      <span class="field__label">Gender</span>
      <span class="field__value">{{ item.gender | titlecase }}</span>
    </div>
    <div class="field">
      <span class="field__label">Color</span>
      <span class="field__value">{{ item.color }}</span>
    </div>
    <div class="field">
      <span class="field__label">Date of Birth</span>
      <span class="field__value">{{ item.dateOfBirth | date: 'd.M.yyyy' }}</span>
    </div>
    <div class="field" *ngIf="item.titles && item.titles !== '—'">
      <span class="field__label">Titles</span>
      <span class="field__value">{{ item.titles }}</span>
    </div>
  </div>

  <div class="dog-profile-card__status">
    <span class="status-chip status-chip--{{ item.status }}">
      {{ item.status === 'available' ? 'Available' : item.status === 'reserved' ? 'Reserved' : 'Sold' }}
    </span>
  </div>
</article>
